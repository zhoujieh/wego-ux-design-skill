<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switch 组件预览 — 微购设计库</title>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="../scaffold.css">
  <link rel="stylesheet" href="../components.css">
  <style>
    /* @component-css-start */

    .wg-switch {
      inline-size: var(--wg-touch-default);
      block-size: var(--wg-size-24);
      padding: var(--wg-spacing-2);
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      appearance: none;
      -webkit-appearance: none;
      border-radius: var(--wg-radius-full);
      border: var(--wg-stroke-width-none) var(--wg-stroke-style-none);
      background-color: var(--wg-color-state-disabled-bg);
      cursor: pointer;
      font: inherit;
      transition:
        background-color var(--wg-motion-duration-normal) var(--wg-motion-ease-standard),
        box-shadow var(--wg-motion-duration-normal) var(--wg-motion-ease-standard);
    }

    .wg-switch__thumb {
      inline-size: var(--wg-size-20);
      block-size: var(--wg-size-20);
      border-radius: var(--wg-radius-full);
      background-color: var(--wg-color-bg-surface);
      box-shadow: var(--wg-shadow-xs);
      transition:
        transform var(--wg-motion-duration-normal) var(--wg-motion-ease-standard),
        opacity var(--wg-motion-duration-normal) var(--wg-motion-ease-standard);
    }

    .wg-switch--on {
      background-color: var(--wg-color-action-primary-default);
    }

    .wg-switch--on .wg-switch__thumb {
      transform: translateX(calc(var(--wg-touch-default) - var(--wg-size-24)));
    }

    .wg-switch--disabled {
      cursor: not-allowed;
    }

    .wg-switch--disabled:not(.wg-switch--on) {
      background-color: var(--wg-color-state-disabled-bg);
    }

    .wg-switch--disabled:not(.wg-switch--on) .wg-switch__thumb {
      opacity: 0.72;
    }

    .wg-switch--disabled.wg-switch--on {
      background-color: var(--wg-color-base-brand-alpha-20);
    }

    .wg-switch--disabled.wg-switch--on .wg-switch__thumb {
      opacity: 0.92;
    }

    .wg-switch:not(.wg-switch--disabled):active .wg-switch__thumb {
      transform: translateX(var(--wg-spacing-2)) scaleX(1.08);
    }

    .wg-switch--on:not(.wg-switch--disabled):active .wg-switch__thumb {
      transform: translateX(calc(var(--wg-touch-default) - var(--wg-size-24) - var(--wg-spacing-2))) scaleX(1.08);
    }

    .wg-switch:focus-visible {
      outline: var(--wg-stroke-width-strong) var(--wg-stroke-style-solid) var(--wg-color-state-focus);
      outline-offset: var(--wg-spacing-2);
    }

    @media (prefers-reduced-motion: reduce) {
      .wg-switch,
      .wg-switch__thumb {
        transition-duration: var(--wg-motion-duration-instant);
      }
    }

    /* @component-css-end */

    .preview-body {
      margin: 0;
      min-height: 100vh;
      background: var(--wg-color-bg-page);
      color: var(--wg-color-text-primary);
    }

    .preview-shell {
      max-inline-size: 1120px;
      margin: 0 auto;
      padding: var(--wg-spacing-40) var(--wg-spacing-16);
    }

    .preview-stack {
      display: grid;
      gap: var(--wg-spacing-8);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--wg-spacing-24);
    }

    .preview-panel {
      padding: var(--wg-spacing-16);
      border-radius: var(--wg-radius-md);
      background: rgba(255, 255, 255, 0.56);
    }

    .preview-card {
      padding: var(--wg-spacing-24);
      border-radius: var(--wg-radius-md);
      background: var(--wg-color-bg-surface);
    }

    .preview-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--wg-spacing-16);
    }

    .preview-live-note {
      font-size: var(--wg-font-size-12);
      line-height: var(--wg-font-lineheight-12);
      color: var(--wg-color-text-tertiary);
    }

    @media (max-width: 900px) {
      .preview-grid {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>
</head>
<body class="preview-body">
  <main class="preview-shell preview-stack">
    <header class="preview-stack">
      <h1 class="wg-h1">Switch 组件预览</h1>
      <p class="wg-text-secondary">按 Figma 设计稿还原 44 × 24 iOS 风格开关，并补充可点击的真实切换动画示例。</p>
    </header>
<!-- @component-markup-start -->

    <section class="preview-grid">
      <article class="preview-panel preview-stack">
        <h2 class="wg-h2">静态状态</h2>
        <div class="preview-card preview-stack">
          <div class="preview-row">
            <span class="wg-text-secondary">开启</span>
            <button class="wg-switch wg-switch--on" type="button" aria-checked="true">
              <span class="wg-switch__thumb"></span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">禁用开启</span>
            <button class="wg-switch wg-switch--on wg-switch--disabled" type="button" aria-checked="true" disabled>
              <span class="wg-switch__thumb"></span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">关闭</span>
            <button class="wg-switch" type="button" aria-checked="false">
              <span class="wg-switch__thumb"></span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">禁用关闭</span>
            <button class="wg-switch wg-switch--disabled" type="button" aria-checked="false" disabled>
              <span class="wg-switch__thumb"></span>
            </button>
          </div>
        </div>
      </article>

      <article class="preview-panel preview-stack">
        <h2 class="wg-h2">动画交互示例</h2>
        <div class="preview-card preview-stack">
          <div class="preview-row">
            <span class="wg-text-secondary">点击切换</span>
            <button class="wg-switch js-live-switch" type="button" aria-checked="false">
              <span class="wg-switch__thumb"></span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">默认开启</span>
            <button class="wg-switch wg-switch--on js-live-switch" type="button" aria-checked="true">
              <span class="wg-switch__thumb"></span>
            </button>
          </div>
          <p class="preview-live-note">点击上方两个示例可直接看到轨道颜色与 thumb 位移的切换动画。</p>
        </div>
      </article>

      <article class="preview-panel preview-stack">
        <h2 class="wg-h2">Cell 集成</h2>
        <div class="preview-card preview-stack">
          <div class="preview-row">
            <span class="wg-text-secondary">消息提醒</span>
            <button class="wg-switch wg-switch--on" type="button" aria-checked="true">
              <span class="wg-switch__thumb"></span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">仅 Wi-Fi 自动播放</span>
            <button class="wg-switch" type="button" aria-checked="false">
              <span class="wg-switch__thumb"></span>
            </button>
          </div>
        </div>
      </article>
    </section>
  </main>

<!-- @component-markup-end -->
  <script>
    document.querySelectorAll(".js-live-switch").forEach((node) => {
      node.addEventListener("click", () => {
        const isOn = node.classList.toggle("wg-switch--on");
        node.setAttribute("aria-checked", String(isOn));
      });
    });
  </script>
</body>
</html>
