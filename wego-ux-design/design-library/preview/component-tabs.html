<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs 组件预览 — 微购设计库</title>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="../scaffold.css">
  <link rel="stylesheet" href="../assets/fonts/iconfont/iconfont.css">
  <link rel="stylesheet" href="../components.css">
  <style>
    /* @component-css-start */

    .wg-tabs {
      display: flex;
      inline-size: 100%;
      background-color: var(--wg-color-bg-surface);
      --_tabs-indicator-standard-height: calc(var(--wg-spacing-2) + var(--wg-stroke-width-default));
      --_tabs-indicator-mini-height: var(--wg-spacing-2);
      --_tabs-label-standard-max: calc(var(--wg-font-size-16) * 4);
      --_tabs-label-mini-max: calc(var(--wg-font-size-14) * 4);
    }

    .wg-tabs__scroll {
      position: relative;
      display: flex;
      inline-size: 100%;
    }

    .wg-tabs--divide .wg-tabs__scroll {
      flex-wrap: nowrap;
    }

    .wg-tabs--divide .wg-tabs__item {
      flex: 1 1 0;
      min-inline-size: 0;
    }

    .wg-tabs--scroll .wg-tabs__scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-wrap: nowrap;
    }

    .wg-tabs--scroll .wg-tabs__scroll::-webkit-scrollbar {
      display: none;
    }

    .wg-tabs--scroll .wg-tabs__item {
      flex: 0 0 auto;
    }

    .wg-tabs__item {
      appearance: none;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: var(--wg-spacing-0);
      border: var(--wg-stroke-width-none) var(--wg-stroke-style-none);
      background: var(--wg-color-transparent);
      cursor: pointer;
      position: relative;
      transition:
        opacity var(--wg-motion-duration-fast) var(--wg-motion-ease-standard);
    }

    .wg-tabs__content {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      block-size: 100%;
      gap: var(--wg-spacing-4);
      min-inline-size: 0;
    }

    .wg-tabs--divide .wg-tabs__content {
      inline-size: fit-content;
      max-inline-size: 100%;
      margin-inline: auto;
    }

    .wg-tabs--scroll .wg-tabs__content {
      inline-size: 100%;
    }

    .wg-tabs--standard .wg-tabs__item {
      block-size: var(--wg-size-56);
      padding-inline: var(--wg-spacing-16);
    }

    .wg-tabs--standard .wg-tabs__label {
      font-size: var(--wg-font-size-16);
      line-height: var(--wg-font-lineheight-16);
      font-weight: var(--wg-font-weight-medium);
      color: var(--wg-color-text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-inline-size: var(--_tabs-label-standard-max);
    }

    .wg-tabs--standard .wg-tabs__item[aria-selected="true"] .wg-tabs__label {
      color: var(--wg-color-text-primary);
    }

    .wg-tabs__icon {
      flex-shrink: 0;
      color: var(--wg-color-text-secondary);
      font-size: var(--wg-size-16);
      line-height: 1;
    }

    .wg-tabs__item[aria-selected="true"] .wg-tabs__icon {
      color: var(--wg-color-text-primary);
    }

    .wg-tabs--mini .wg-tabs__item {
      block-size: var(--wg-size-48);
      padding-inline: var(--wg-spacing-8);
    }

    .wg-tabs--mini .wg-tabs__item--first {
      padding-left: var(--wg-spacing-16);
    }

    .wg-tabs--mini .wg-tabs__label {
      font-size: var(--wg-font-size-14);
      line-height: var(--wg-font-lineheight-14);
      font-weight: var(--wg-font-weight-medium);
      color: var(--wg-color-text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-inline-size: var(--_tabs-label-mini-max);
    }

    .wg-tabs--mini .wg-tabs__item[aria-selected="true"] .wg-tabs__label {
      color: var(--wg-color-text-primary);
    }

    .wg-tabs__active-indicator {
      position: absolute;
      inset-block-end: 0;
      inset-inline-start: 0;
      inline-size: var(--_tabs-indicator-width, var(--wg-stroke-width-none));
      display: block;
      background-color: var(--wg-color-action-primary-default);
      border-radius: var(--wg-radius-none);
      transform: translateX(var(--_tabs-indicator-x, var(--wg-spacing-0)));
      transition:
        transform var(--wg-motion-duration-normal) var(--wg-motion-ease-emphasized),
        inline-size var(--wg-motion-duration-normal) var(--wg-motion-ease-emphasized);
      pointer-events: none;
    }

    .wg-tabs--standard .wg-tabs__active-indicator {
      block-size: var(--_tabs-indicator-standard-height);
    }

    .wg-tabs--mini .wg-tabs__active-indicator {
      block-size: var(--_tabs-indicator-mini-height);
    }

    .wg-tabs__item:not(:disabled):active {
      opacity: 0.6;
    }

    .wg-tabs__item:focus-visible {
      outline: none;
    }

    .wg-tabs__item:focus-visible .wg-tabs__label {
      outline: var(--wg-stroke-width-strong) var(--wg-stroke-style-solid) var(--wg-color-state-focus);
      outline-offset: var(--wg-spacing-2);
    }

    /* @component-css-end */

    .preview-body {
      max-width: 670px;
      margin: 0 auto;
      background: var(--wg-color-bg-page);
      min-height: 100vh;
    }

    .preview-header {
      margin: var(--wg-spacing-40) var(--wg-spacing-16);
    }

    .scope-section {
      margin: var(--wg-spacing-24) var(--wg-spacing-16);
    }

    .scope-section > h2 {
      margin-bottom: var(--wg-spacing-16);
    }

    .variant-card {
      background: var(--wg-color-bg-surface);
      border-radius: var(--wg-radius-md);
      padding: var(--wg-spacing-16);
      margin-bottom: var(--wg-spacing-16);
    }

    .variant-card--scroll-demo {
      overflow: hidden;
    }
  </style>
</head>

<!-- @component-markup-end -->
<script>
  function updateTabsIndicator(tabs) {
    const scroll = tabs.querySelector('.wg-tabs__scroll');
    const indicator = tabs.querySelector('.wg-tabs__active-indicator');
    const selected = tabs.querySelector('.wg-tabs__item[aria-selected="true"] .wg-tabs__content');

    if (!scroll || !indicator || !selected) {
      return;
    }

    const scrollRect = scroll.getBoundingClientRect();
    const selectedRect = selected.getBoundingClientRect();
    const x = selectedRect.left - scrollRect.left + scroll.scrollLeft;

    indicator.style.setProperty('--_tabs-indicator-x', `${x}px`);
    indicator.style.setProperty('--_tabs-indicator-width', `${selectedRect.width}px`);
  }

  document.querySelectorAll('.wg-tabs').forEach((tabs) => {
    const items = Array.from(tabs.querySelectorAll('.wg-tabs__item'));
    const scroll = tabs.querySelector('.wg-tabs__scroll');

    requestAnimationFrame(() => updateTabsIndicator(tabs));

    items.forEach((item) => {
      item.addEventListener('click', () => {
        items.forEach((candidate) => {
          candidate.setAttribute('aria-selected', String(candidate === item));
        });

        updateTabsIndicator(tabs);

        item.scrollIntoView({
          behavior: 'smooth',
          block: 'nearest',
          inline: 'center'
        });
      });
    });

    if (tabs.classList.contains('wg-tabs--scroll')) {
      scroll.addEventListener('wheel', (event) => {
        if (Math.abs(event.deltaY) <= Math.abs(event.deltaX)) {
          return;
        }

        event.preventDefault();
        scroll.scrollLeft += event.deltaY;
      }, { passive: false });
    }
  });

  window.addEventListener('resize', () => {
    document.querySelectorAll('.wg-tabs').forEach(updateTabsIndicator);
  });
</script>
