<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox 组件预览 — 微购设计库</title>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="../scaffold.css">
  <link rel="stylesheet" href="../components.css">
  <style>
    /* @component-css-start */

    .wg-checkbox {
      --wg-checkbox-accent: var(--wg-color-action-primary-default);
      --wg-checkbox-accent-disabled: var(--wg-color-action-primary-disabled);
      inline-size: var(--wg-size-24);
      block-size: var(--wg-size-24);
      padding: var(--wg-spacing-0);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      appearance: none;
      -webkit-appearance: none;
      border-radius: var(--wg-radius-full);
      border: var(--wg-stroke-width-default) var(--wg-stroke-style-solid) var(--wg-color-border-default);
      background-color: var(--wg-color-bg-surface);
      color: var(--wg-color-text-inverse);
      cursor: pointer;
      font: inherit;
      transition:
        background-color var(--wg-motion-duration-fast) var(--wg-motion-ease-standard),
        border-color var(--wg-motion-duration-fast) var(--wg-motion-ease-standard),
        color var(--wg-motion-duration-fast) var(--wg-motion-ease-standard),
        transform var(--wg-motion-duration-fast) var(--wg-motion-ease-standard);
    }

    .wg-checkbox__indicator {
      position: relative;
      inline-size: var(--wg-size-12);
      block-size: var(--wg-size-12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition:
        opacity var(--wg-motion-duration-fast) var(--wg-motion-ease-standard),
        transform var(--wg-motion-duration-fast) var(--wg-motion-ease-standard);
      transform: scale(0.8);
    }

    .wg-checkbox--checked,
    .wg-checkbox--indeterminate {
      border-color: var(--wg-checkbox-accent);
      background-color: var(--wg-checkbox-accent);
    }

    .wg-checkbox--checked .wg-checkbox__indicator,
    .wg-checkbox--indeterminate .wg-checkbox__indicator {
      opacity: 1;
      transform: scale(1);
    }

    .wg-checkbox--mark-check .wg-checkbox__indicator::after {
      content: "";
      inline-size: var(--wg-spacing-4);
      block-size: var(--wg-spacing-8);
      border-inline-end: var(--wg-stroke-width-strong) var(--wg-stroke-style-solid) currentColor;
      border-block-end: var(--wg-stroke-width-strong) var(--wg-stroke-style-solid) currentColor;
      transform: rotate(45deg) translateY(calc(var(--wg-spacing-2) / -2));
    }

    .wg-checkbox--mark-minus .wg-checkbox__indicator::after {
      content: "";
      inline-size: var(--wg-spacing-8);
      block-size: var(--wg-spacing-2);
      border-radius: var(--wg-radius-full);
      background-color: currentColor;
    }

    .wg-checkbox--mark-number .wg-checkbox__indicator {
      font-size: var(--wg-font-size-10);
      line-height: var(--wg-font-lineheight-10);
      font-weight: var(--wg-font-weight-semibold);
    }

    .wg-checkbox--disabled {
      cursor: not-allowed;
    }

    .wg-checkbox--disabled:not(.wg-checkbox--checked):not(.wg-checkbox--indeterminate) {
      border-color: var(--wg-color-state-disabled-bg);
      background-color: var(--wg-color-state-disabled-bg);
      color: var(--wg-color-state-disabled-text);
    }

    .wg-checkbox--disabled.wg-checkbox--checked,
    .wg-checkbox--disabled.wg-checkbox--indeterminate {
      border-color: var(--wg-checkbox-accent-disabled);
      background-color: var(--wg-checkbox-accent-disabled);
    }

    .wg-checkbox--dark:not(.wg-checkbox--checked):not(.wg-checkbox--indeterminate) {
      border-color: var(--wg-color-text-inverse-weak);
      background-color: var(--wg-color-bg-inverse-subtle);
      color: var(--wg-color-text-inverse);
    }

    .wg-checkbox:not(.wg-checkbox--disabled):active {
      transform: scale(0.94);
    }

    .wg-checkbox:focus-visible {
      outline: var(--wg-stroke-width-strong) var(--wg-stroke-style-solid) var(--wg-color-state-focus);
      outline-offset: var(--wg-spacing-2);
    }

    /* @component-css-end */

    .preview-body {
      margin: 0;
      min-height: 100vh;
      background: var(--wg-color-bg-page);
      color: var(--wg-color-text-primary);
    }

    .preview-shell {
      max-inline-size: 1120px;
      margin: 0 auto;
      padding: var(--wg-spacing-40) var(--wg-spacing-16);
    }

    .preview-stack {
      display: grid;
      gap: var(--wg-spacing-8);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--wg-spacing-24);
    }

    .preview-panel {
      padding: var(--wg-spacing-16);
      border-radius: var(--wg-radius-md);
      background: rgba(255, 255, 255, 0.56);
    }

    .preview-card {
      padding: var(--wg-spacing-24);
      border-radius: var(--wg-radius-md);
      background: var(--wg-color-bg-surface);
    }

    .preview-dark-card {
      background: var(--wg-color-surface-inverse);
      color: var(--wg-color-text-inverse);
    }

    .preview-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--wg-spacing-16);
    }

    @media (max-width: 900px) {
      .preview-grid {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>
</head>
<body class="preview-body">
  <main class="preview-shell preview-stack">
    <header class="preview-stack">
      <h1 class="wg-h1">Checkbox 组件预览</h1>
      <p class="wg-text-secondary">按 Figma 设计稿还原圆形多选体系，覆盖默认、选中、禁用、数字、半选和暗底状态。</p>
    </header>
<!-- @component-markup-start -->

    <section class="preview-grid">
      <article class="preview-panel preview-stack">
        <h2 class="wg-h2">基础状态</h2>
        <div class="preview-card preview-stack">
          <div class="preview-row">
            <span class="wg-text-secondary">未选中</span>
            <button class="wg-checkbox wg-checkbox--mark-check" type="button" aria-checked="false">
              <span class="wg-checkbox__indicator"></span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">已选中</span>
            <button class="wg-checkbox wg-checkbox--mark-check wg-checkbox--checked" type="button" aria-checked="true">
              <span class="wg-checkbox__indicator"></span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">禁用未选</span>
            <button class="wg-checkbox wg-checkbox--mark-check wg-checkbox--disabled" type="button" aria-checked="false" disabled>
              <span class="wg-checkbox__indicator"></span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">禁用已选</span>
            <button class="wg-checkbox wg-checkbox--mark-check wg-checkbox--checked wg-checkbox--disabled" type="button" aria-checked="true" disabled>
              <span class="wg-checkbox__indicator"></span>
            </button>
          </div>
        </div>
      </article>

      <article class="preview-panel preview-stack">
        <h2 class="wg-h2">数字与半选</h2>
        <div class="preview-card preview-stack">
          <div class="preview-row">
            <span class="wg-text-secondary">数字</span>
            <button class="wg-checkbox wg-checkbox--mark-number wg-checkbox--checked" type="button" aria-checked="true">
              <span class="wg-checkbox__indicator">2</span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">半选</span>
            <button class="wg-checkbox wg-checkbox--mark-minus wg-checkbox--indeterminate" type="button" aria-checked="mixed">
              <span class="wg-checkbox__indicator"></span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">禁用半选</span>
            <button class="wg-checkbox wg-checkbox--mark-minus wg-checkbox--indeterminate wg-checkbox--disabled" type="button" aria-checked="mixed" disabled>
              <span class="wg-checkbox__indicator"></span>
            </button>
          </div>
        </div>
      </article>

      <article class="preview-panel preview-stack">
        <h2 class="wg-h2">暗底模式</h2>
        <div class="preview-card preview-dark-card preview-stack">
          <div class="preview-row">
            <span class="wg-text-secondary">暗底未选</span>
            <button class="wg-checkbox wg-checkbox--mark-check wg-checkbox--dark" type="button" aria-checked="false">
              <span class="wg-checkbox__indicator"></span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">暗底已选</span>
            <button class="wg-checkbox wg-checkbox--mark-check wg-checkbox--checked" type="button" aria-checked="true">
              <span class="wg-checkbox__indicator"></span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">暗底数字</span>
            <button class="wg-checkbox wg-checkbox--mark-number wg-checkbox--checked" type="button" aria-checked="true">
              <span class="wg-checkbox__indicator">2</span>
            </button>
          </div>
        </div>
      </article>

      <article class="preview-panel preview-stack">
        <h2 class="wg-h2">Cell 集成</h2>
        <div class="preview-card preview-stack">
          <div class="preview-row">
            <span class="wg-text-secondary">列表多选</span>
            <button class="wg-checkbox wg-checkbox--mark-check wg-checkbox--checked" type="button" aria-checked="true">
              <span class="wg-checkbox__indicator"></span>
            </button>
          </div>
          <div class="preview-row">
            <span class="wg-text-secondary">批量半选</span>
            <button class="wg-checkbox wg-checkbox--mark-minus wg-checkbox--indeterminate" type="button" aria-checked="mixed">
              <span class="wg-checkbox__indicator"></span>
            </button>
          </div>
        </div>
      </article>
    </section>
  </main>
<!-- @component-markup-end -->
</body>
</html>
