<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>发布商品</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="assets/fonts/iconfont/iconfont.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body class="page-surface">

  <!-- NavBar -->
  <header class="wg-navbar wg-navbar--standard wg-navbar--bg-default wg-navbar--divider">
    <div class="wg-navbar__left">
      <button class="wg-navbar__left-btn wg-navbar__left-btn--back" type="button" id="btnBack" aria-label="返回">
        <svg class="wg-navbar__left-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M15.5 19L9 12.5L15.5 6" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="wg-navbar__center">
      <h1 class="wg-navbar__title">发布商品</h1>
    </div>
    <div class="wg-navbar__actions">
      <button class="wg-navbar__action wg-navbar__action--button" type="button" id="btnQuickPublish">
        <span class="wg-navbar__action-label">发布</span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="page-content" id="pageContent">

    <!-- ===== 内容分组 ===== -->
    <div class="section-header">
      <span class="section-header__title">内容</span>
    </div>

    <div class="wg-form-group">
      <!-- 产品标题 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="title">
        <div class="wg-form__body">
          <label class="wg-form__label">产品标题</label>
          <div class="wg-form__action">
            <input class="wg-form__input" type="text" placeholder="请输入产品标题" maxlength="60" />
          </div>
        </div>
        <p class="wg-form__hint wg-form__hint--count" style="display:none">0/60</p>
      </div>

      <!-- 商品图片 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="images">
        <div class="wg-form__body">
          <label class="wg-form__label">商品图片</label>
          <div class="wg-form__action">
            <div class="image-upload-area" id="imageUpload">
              <div class="image-upload__grid" id="imageGrid">
                <button class="image-upload__add" type="button" id="btnAddImage" aria-label="添加图片">
                  <i class="wego-iconfont-s icon-jia16 image-upload__add-icon"></i>
                </button>
              </div>
              <input type="file" id="fileInput" accept="image/*" multiple hidden />
            </div>
          </div>
        </div>
        <p class="wg-form__hint wg-form__hint--count" style="display:none">0/9 张</p>
      </div>

      <!-- 搭配 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="match">
        <div class="wg-form__body">
          <label class="wg-form__label">搭配</label>
          <div class="wg-form__action wg-form__action--select" role="button" tabindex="0">
            <span class="wg-form__display wg-form__display--placeholder">选择搭配</span>
            <i class="wg-form__arrow"></i>
          </div>
        </div>
      </div>

      <!-- 标签 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="tags">
        <div class="wg-form__body">
          <label class="wg-form__label">标签</label>
          <div class="wg-form__action">
            <div class="wg-tag-group" id="tagGroup">
              <span class="wg-tag wg-tag--28 wg-tag--grey" role="button" tabindex="0" aria-pressed="false" data-value="new">
                <span class="wg-tag__text">新品</span>
              </span>
              <span class="wg-tag wg-tag--28 wg-tag--grey" role="button" tabindex="0" aria-pressed="false" data-value="hot">
                <span class="wg-tag__text">热销</span>
              </span>
              <span class="wg-tag wg-tag--28 wg-tag--grey" role="button" tabindex="0" aria-pressed="false" data-value="recommend">
                <span class="wg-tag__text">推荐</span>
              </span>
              <span class="wg-tag wg-tag--28 wg-tag--grey" role="button" tabindex="0" aria-pressed="false" data-value="limited">
                <span class="wg-tag__text">限量</span>
              </span>
              <span class="wg-tag wg-tag--28 wg-tag--grey" role="button" tabindex="0" aria-pressed="false" data-value="discount">
                <span class="wg-tag__text">折扣</span>
              </span>
              <span class="wg-tag wg-tag--28 wg-tag--grey" role="button" tabindex="0" aria-pressed="false" data-value="clearance">
                <span class="wg-tag__text">清仓</span>
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- 水印 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="watermark">
        <div class="wg-form__body">
          <label class="wg-form__label">水印</label>
          <div class="wg-form__action wg-form__action--select" role="button" tabindex="0">
            <span class="wg-form__display wg-form__display--placeholder">选择水印</span>
            <i class="wg-form__arrow"></i>
          </div>
        </div>
      </div>

      <!-- 产品分类 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="category">
        <div class="wg-form__body">
          <label class="wg-form__label">产品分类</label>
          <div class="wg-form__action wg-form__action--select" role="button" tabindex="0">
            <span class="wg-form__display wg-form__display--placeholder">选择产品分类</span>
            <i class="wg-form__arrow"></i>
          </div>
        </div>
      </div>

      <!-- 谁可以看 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="visibility">
        <div class="wg-form__body">
          <label class="wg-form__label">谁可以看</label>
          <div class="wg-form__action wg-form__action--select" role="button" tabindex="0">
            <span class="wg-form__display">公开：所有粉丝可见</span>
            <i class="wg-form__arrow"></i>
          </div>
        </div>
      </div>

      <!-- 来源（仅自己可见） -->
      <div class="wg-form wg-form--horizontal" data-field="source">
        <div class="wg-form__body">
          <label class="wg-form__label">来源</label>
          <div class="wg-form__action wg-form__action--select" role="button" tabindex="0">
            <span class="wg-form__display wg-form__display--placeholder">无</span>
            <i class="wg-form__arrow"></i>
          </div>
          <div class="wg-form__right">
            <a class="wg-link wg-link--standalone" href="javascript:void(0)">
              <span class="wg-link__surface">
                <span class="wg-link__label">仅自己可见</span>
              </span>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== 产品属性分组 ===== -->
    <div class="section-header">
      <span class="section-header__title">产品属性</span>
    </div>

    <div class="wg-form-group">
      <!-- 货号 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="sku">
        <div class="wg-form__body">
          <label class="wg-form__label">货号</label>
          <div class="wg-form__action">
            <input class="wg-form__input" type="text" placeholder="请输入货号" />
          </div>
        </div>
      </div>

      <!-- 简称 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="shortName">
        <div class="wg-form__body">
          <label class="wg-form__label">简称</label>
          <div class="wg-form__action">
            <input class="wg-form__input" type="text" placeholder="请输入简称" maxlength="20" />
          </div>
        </div>
      </div>

      <!-- 规格 (跳转) -->
      <div class="wg-cell wg-cell--default wg-cell--jump wg-cell--divider-full" data-field="specs" role="button" tabindex="0">
        <div class="wg-cell__body">
          <div class="wg-cell__content">
            <span class="wg-cell__title">规格</span>
          </div>
        </div>
        <div class="wg-cell__action">
          <span class="wg-cell__action-text">无</span>
          <i class="wg-cell__arrow"></i>
        </div>
      </div>

      <!-- 售价 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="price">
        <div class="wg-form__body">
          <label class="wg-form__label">售价</label>
          <div class="wg-form__action">
            <span class="wg-form__currency">¥</span>
            <input class="wg-form__input" type="text" inputmode="decimal" placeholder="0.00" />
          </div>
        </div>
      </div>

      <!-- 批发价 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="wholesalePrice">
        <div class="wg-form__body">
          <label class="wg-form__label">批发价</label>
          <div class="wg-form__action">
            <span class="wg-form__currency">¥</span>
            <input class="wg-form__input" type="text" inputmode="decimal" placeholder="0.00" />
          </div>
        </div>
      </div>

      <!-- 打包价 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="bulkPrice">
        <div class="wg-form__body">
          <label class="wg-form__label">打包价</label>
          <div class="wg-form__action">
            <span class="wg-form__currency">¥</span>
            <input class="wg-form__input" type="text" inputmode="decimal" placeholder="0.00" />
          </div>
        </div>
      </div>

      <!-- 代发价 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="dropshipPrice">
        <div class="wg-form__body">
          <label class="wg-form__label">代发价</label>
          <div class="wg-form__action">
            <span class="wg-form__currency">¥</span>
            <input class="wg-form__input" type="text" inputmode="decimal" placeholder="0.00" />
          </div>
        </div>
      </div>

      <!-- 拿货价 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="procurementPrice">
        <div class="wg-form__body">
          <label class="wg-form__label">拿货价</label>
          <div class="wg-form__action">
            <span class="wg-form__currency">¥</span>
            <input class="wg-form__input" type="text" inputmode="decimal" placeholder="0.00" />
          </div>
        </div>
      </div>

      <!-- 帮卖分销 (跳转) -->
      <div class="wg-cell wg-cell--default wg-cell--jump wg-cell--divider-full" data-field="distribution" role="button" tabindex="0">
        <div class="wg-cell__body">
          <div class="wg-cell__content">
            <span class="wg-cell__title">帮卖分销</span>
          </div>
        </div>
        <div class="wg-cell__action">
          <span class="wg-cell__action-text">未设置</span>
          <i class="wg-cell__arrow"></i>
        </div>
      </div>

      <!-- 添加活动 (跳转) -->
      <div class="wg-cell wg-cell--default wg-cell--jump wg-cell--divider-full" data-field="promotion" role="button" tabindex="0">
        <div class="wg-cell__body">
          <div class="wg-cell__content">
            <span class="wg-cell__title">添加活动</span>
          </div>
        </div>
        <div class="wg-cell__action">
          <span class="wg-cell__action-text">未设置</span>
          <i class="wg-cell__arrow"></i>
        </div>
      </div>

      <!-- 库存 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="stock">
        <div class="wg-form__body">
          <label class="wg-form__label">库存</label>
          <div class="wg-form__action">
            <input class="wg-form__input wg-form__input--number" type="text" inputmode="numeric" placeholder="不限" />
          </div>
        </div>
      </div>

      <!-- 重量 -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="weight">
        <div class="wg-form__body">
          <label class="wg-form__label">重量（kg）</label>
          <div class="wg-form__action">
            <input class="wg-form__input wg-form__input--number" type="text" inputmode="decimal" placeholder="0.00" />
          </div>
        </div>
      </div>

      <!-- 运费模板 (选择) -->
      <div class="wg-form wg-form--horizontal wg-form--divider" data-field="shippingTemplate">
        <div class="wg-form__body">
          <label class="wg-form__label">运费模板</label>
          <div class="wg-form__action wg-form__action--select" role="button" tabindex="0">
            <span class="wg-form__display wg-form__display--placeholder">运费模板</span>
            <i class="wg-form__arrow"></i>
          </div>
        </div>
      </div>

      <!-- 商品备注 (跳转) -->
      <div class="wg-cell wg-cell--default wg-cell--jump" data-field="remark" role="button" tabindex="0">
        <div class="wg-cell__body">
          <div class="wg-cell__content">
            <span class="wg-cell__title">商品备注</span>
          </div>
        </div>
        <div class="wg-cell__action">
          <span class="wg-cell__action-text">写备注</span>
          <i class="wg-cell__arrow"></i>
        </div>
      </div>
    </div>

    <!-- 底部间距 -->
    <div class="bottom-spacer"></div>
  </main>

  <!-- 底部发布按钮 -->
  <footer class="page-footer">
    <div class="wg-button-group wg-button-group--page wg-button-group--single wg-button-group--form">
      <button class="wg-button wg-button--page wg-button--strong" type="button" id="btnPublish">
        <span class="wg-button__surface">
          <span class="wg-button__label">发布</span>
        </span>
      </button>
    </div>
  </footer>

  <!-- ActionSheet (动态填充) -->
  <div class="wg-actionsheet" id="actionSheet" style="display:none" role="dialog" aria-modal="true" aria-label="选项">
    <div class="wg-actionsheet__overlay"></div>
    <div class="wg-actionsheet__panel" id="actionSheetPanel">
      <div class="wg-actionsheet__header" id="actionSheetHeader" style="display:none">
        <span class="wg-actionsheet__header-text" id="actionSheetHeaderText"></span>
      </div>
      <div class="wg-actionsheet__list" id="actionSheetList"></div>
      <div class="wg-actionsheet__separator"></div>
      <button class="wg-actionsheet__cancel" type="button" id="actionSheetCancel">
        <span class="wg-actionsheet__cancel-text">取消</span>
      </button>
      <div class="wg-actionsheet__safe-area"></div>
    </div>
  </div>

  <!-- Dialog 离开确认 -->
  <div class="wg-dialog-overlay" id="dialogLeave" data-state="closed">
    <div class="wg-dialog wg-dialog--text" role="dialog" aria-modal="true" aria-labelledby="dialogLeaveTitle">
      <div class="wg-dialog__content">
        <div class="wg-dialog__header">
          <h2 class="wg-dialog__title" id="dialogLeaveTitle">确认离开</h2>
        </div>
        <p class="wg-dialog__description">已填写的内容将不会保存</p>
      </div>
      <div class="wg-dialog__action">
        <div class="wg-dialog__buttons wg-dialog__buttons--dual">
          <button class="wg-dialog__button wg-dialog__button--dismiss" type="button" id="btnLeaveDismiss">取消</button>
          <button class="wg-dialog__button wg-dialog__button--confirm wg-dialog__button--danger" type="button" id="btnLeaveConfirm">离开</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Dialog 发布确认 -->
  <div class="wg-dialog-overlay" id="dialogPublish" data-state="closed">
    <div class="wg-dialog wg-dialog--text" role="dialog" aria-modal="true" aria-labelledby="dialogPublishTitle">
      <div class="wg-dialog__content">
        <div class="wg-dialog__header">
          <h2 class="wg-dialog__title" id="dialogPublishTitle">确认发布</h2>
        </div>
        <p class="wg-dialog__description">发布后商品将展示给所有可见用户</p>
      </div>
      <div class="wg-dialog__action">
        <div class="wg-dialog__buttons wg-dialog__buttons--dual">
          <button class="wg-dialog__button wg-dialog__button--dismiss" type="button" id="btnPublishDismiss">取消</button>
          <button class="wg-dialog__button wg-dialog__button--confirm" type="button" id="btnPublishConfirm">确认发布</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading 模态 -->
  <div class="wg-loading wg-loading--modal" id="loadingModal" data-state="hidden" role="status" aria-live="polite">
    <div class="wg-loading__overlay">
      <div class="wg-loading__toast">
        <div class="wg-loading__spinner wg-loading__spinner--sm"></div>
        <span class="wg-loading__text">发布中...</span>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="wg-toast-container" id="toastContainer" data-state="hidden">
    <div class="wg-toast wg-toast--default" role="status" aria-live="polite">
      <i class="wg-toast__icon" id="toastIcon"></i>
      <span class="wg-toast__message" id="toastMessage"></span>
    </div>
  </div>

  <script src="scripts/app.js"></script>
</body>
</html>
