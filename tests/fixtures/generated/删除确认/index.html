<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>删除确认</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <div class="app-shell" data-app data-status="initial">
    <div class="page">
      <header class="wg-navbar wg-navbar--standard wg-navbar--bg-default wg-navbar--divider">
  <div class="wg-navbar__left">
    <button class="wg-navbar__left-btn" type="button" data-action="back-home" aria-label="返回">返回</button>
  </div>
  <div class="wg-navbar__center"><span class="wg-navbar__title">客户标签</span></div>
  <div class="wg-navbar__actions"></div>
</header>
<main class="content">
  <section class="stack">
    <article class="wg-cell" data-removable><div><div class="wg-cell__title">高意向客户</div><div class="wg-cell__meta">128 人</div></div><button class="wg-button wg-button--compact wg-button--weak" type="button" data-action="open-dialog"><span class="wg-button__surface"><span class="wg-button__label">删除</span></span></button></article>
    <article class="wg-cell"><div><div class="wg-cell__title">复购客户</div><div class="wg-cell__meta">76 人</div></div><button class="wg-button wg-button--compact wg-button--strong" type="button" data-action="submit"><span class="wg-button__surface"><span class="wg-button__label">管理</span></span></button></article>
  </section>
  <div class="wg-dialog-overlay" data-dialog data-state="closed" hidden>
  <div class="wg-dialog wg-dialog--text" role="dialog" aria-modal="true">
    <div class="wg-dialog__content">
      <div class="wg-dialog__header"><span class="wg-dialog__title">确认删除</span></div>
      <p class="wg-dialog__description">删除后标签不会再出现在客户筛选中，失败后可重试。</p>
    </div>
    <div class="wg-dialog__action">
      <div class="wg-dialog__buttons wg-dialog__buttons--dual">
        <button class="wg-dialog__button wg-dialog__button--dismiss" type="button" data-action="close-dialog">取消</button>
        <button class="wg-dialog__button wg-dialog__button--confirm wg-dialog__button--danger" type="button" data-action="confirm-delete">删除</button>
      </div>
    </div>
  </div>
</div>
</main>
    </div>
  </div>
  <div class="wg-toast" data-toast data-state="hidden">
    <div class="wg-toast__surface" data-toast-message>操作完成</div>
  </div>
  <script src="scripts/app.js"></script>
</body>
</html>
