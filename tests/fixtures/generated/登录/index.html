<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微购登录</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <div class="app-shell" data-app data-status="initial">
    <div class="page">
      <main class="content">
  <section class="card">
    <div class="headline">
      <h1 class="title">登录微购后台</h1>
      <p class="subtitle">使用手机号和验证码完成首次登录。</p>
    </div>
    <div class="wg-form-group">
      <div class="wg-form wg-form--horizontal">
  <div class="wg-form__body">
    <div class="wg-form__label">手机号</div>
    <div class="wg-form__action"><input class="wg-form__input" name="mobile" placeholder="请输入手机号" data-required></div>
  </div>
  <div class="wg-form__hint" data-error hidden>手机号不能为空</div>
</div>
      <div class="wg-form wg-form--horizontal">
  <div class="wg-form__body">
    <div class="wg-form__label">验证码</div>
    <div class="wg-form__action"><input class="wg-form__input" name="code" placeholder="请输入验证码" data-required></div>
  </div>
  <div class="wg-form__hint" data-error hidden>验证码不能为空</div>
</div>
    </div>
    <button class="wg-button wg-button--page wg-button--strong" type="button" data-action="submit"><span class="wg-button__surface"><span class="wg-button__label">登录</span></span></button>
  </section>
  <section class="wg-result" data-result>
  <div class="wg-result__icon">✓</div>
  <h2 class="wg-result__title">登录成功</h2>
  <p class="wg-result__description">已进入微购后台，可以开始管理商品。</p>
</section>
</main>
    </div>
  </div>
  <div class="wg-toast" data-toast data-state="hidden">
    <div class="wg-toast__surface" data-toast-message>操作完成</div>
  </div>
  <script src="scripts/app.js"></script>
</body>
</html>
