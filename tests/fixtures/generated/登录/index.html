<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>微购商家登录</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="assets/fonts/iconfont/iconfont.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <!-- 登录表单页 -->
  <main class="page" id="loginPage">
    <!-- 头部 -->
    <header class="login-header">
      <div class="login-header__logo">
        <i class="wego-iconfont-s icon-dianpu login-header__logo-icon"></i>
      </div>
      <h1 class="login-header__title">微购商家登录</h1>
      <p class="login-header__subtitle">请输入手机号快速登录</p>
    </header>

    <!-- 登录表单 -->
    <form class="login-form" id="loginForm" novalidate>
      <div class="login-form__field-group">
        <!-- 手机号 -->
        <div class="wg-input wg-input--full wg-input--text" id="phoneInput">
          <input
            class="wg-input__field"
            type="tel"
            placeholder="请输入手机号"
            inputmode="numeric"
            maxlength="11"
            autocomplete="tel"
          >
        </div>

        <!-- 验证码 -->
        <div class="login-form__code-row">
          <div class="wg-input wg-input--full wg-input--text" id="codeInput">
            <input
              class="wg-input__field"
              type="text"
              placeholder="请输入验证码"
              inputmode="numeric"
              maxlength="6"
              autocomplete="one-time-code"
            >
          </div>
          <button class="login-form__code-btn" type="button" id="getCodeBtn">获取验证码</button>
        </div>
      </div>

      <!-- 登录按钮 -->
      <div class="login-form__submit-area">
        <div class="wg-button-group wg-button-group--page wg-button-group--single">
          <button class="wg-button wg-button--page wg-button--strong" type="submit" id="loginBtn">
            <span class="wg-button__surface">
              <span class="wg-button__label">登录</span>
            </span>
          </button>
        </div>
        <p class="login-form__agreement">
          登录即表示同意
          <a class="login-form__agreement-link" href="javascript:void(0)">《服务协议》</a>
          和
          <a class="login-form__agreement-link" href="javascript:void(0)">《隐私政策》</a>
        </p>
      </div>
    </form>
  </main>

  <!-- 登录成功页 -->
  <div class="login-success" id="loginSuccess">
    <div class="login-success__icon">
      <i class="wego-iconfont-s icon-gou login-success__icon-inner"></i>
    </div>
    <h2 class="login-success__title">登录成功</h2>
    <p class="login-success__desc">欢迎使用微购商家后台</p>
    <div class="wg-button-group wg-button-group--page wg-button-group--single login-success__button">
      <button class="wg-button wg-button--page wg-button--strong" type="button" id="enterBtn">
        <span class="wg-button__surface">
          <span class="wg-button__label">进入后台</span>
        </span>
      </button>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="wg-toast-container" data-state="hidden" id="toastContainer">
    <div class="wg-toast wg-toast--default" role="status" aria-live="polite">
      <span class="wg-toast__message" id="toastMessage"></span>
    </div>
  </div>

  <script src="scripts/app.js"></script>
</body>
</html>
