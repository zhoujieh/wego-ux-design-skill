<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表单校验失败</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <div class="app-shell" data-app data-status="initial">
    <div class="page">
      <header class="wg-navbar wg-navbar--standard wg-navbar--bg-default wg-navbar--divider">
  <div class="wg-navbar__left">
    <button class="wg-navbar__left-btn" type="button" data-action="back-home" aria-label="返回">返回</button>
  </div>
  <div class="wg-navbar__center"><span class="wg-navbar__title">创建客户</span></div>
  <div class="wg-navbar__actions"></div>
</header>
<main class="content">
  <section class="card">
    <div class="headline"><h1 class="title">客户资料</h1><p class="subtitle">逐项校验姓名、手机号和地址。</p></div>
    <div class="wg-form-group">
      <div class="wg-form wg-form--horizontal">
  <div class="wg-form__body">
    <div class="wg-form__label">姓名</div>
    <div class="wg-form__action"><input class="wg-form__input" name="name" placeholder="请输入客户姓名" data-required></div>
  </div>
  <div class="wg-form__hint" data-error hidden>姓名不能为空</div>
</div>
      <div class="wg-form wg-form--horizontal">
  <div class="wg-form__body">
    <div class="wg-form__label">手机号</div>
    <div class="wg-form__action"><input class="wg-form__input" name="mobile" placeholder="请输入手机号" data-required></div>
  </div>
  <div class="wg-form__hint" data-error hidden>手机号不能为空</div>
</div>
      <div class="wg-form wg-form--horizontal">
  <div class="wg-form__body">
    <div class="wg-form__label">地址</div>
    <div class="wg-form__action"><input class="wg-form__input" name="address" placeholder="请输入收货地址" data-required></div>
  </div>
  <div class="wg-form__hint" data-error hidden>地址不能为空</div>
</div>
    </div>
    <button class="wg-button wg-button--page wg-button--strong" type="button" data-action="submit"><span class="wg-button__surface"><span class="wg-button__label">提交资料</span></span></button>
    <button class="wg-button wg-button--page wg-button--weak" type="button" data-action="reset"><span class="wg-button__surface"><span class="wg-button__label">重置错误</span></span></button>
  </section>
</main>
    </div>
  </div>
  <div class="wg-toast" data-toast data-state="hidden">
    <div class="wg-toast__surface" data-toast-message>操作完成</div>
  </div>
  <script src="scripts/app.js"></script>
</body>
</html>
