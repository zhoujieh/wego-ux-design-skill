<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stat card</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <link rel="stylesheet" href="../scaffold.css" />
  <link rel="stylesheet" href="../components.css" />
  <style>
    /* @component-css-start */
    /* ===== Stat card ===== */
    .ds-statcard {
      display: flex;
      flex-direction: column;
      gap: var(--spacer-8);
      padding: var(--spacer-16);
      background: var(--bg-base-secondary);
      border: 1px solid var(--border-neutral-l1);
      border-radius: var(--radius-10);
      min-width: 200px;
    }
    .ds-statcard__label {
      font-size: var(--body-xs-font-size);
      line-height: var(--body-xs-line-height);
      font-weight: var(--font-weight-medium);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }
    .ds-statcard__value {
      font-family: var(--code-editor-font-family);
      font-variant-numeric: tabular-nums;
      font-size: var(--heading-lg-font-size);
      line-height: var(--heading-lg-line-height);
      font-weight: var(--font-weight-strong);
      color: var(--text-default);
    }
    .ds-statcard__delta {
      display: inline-flex;
      align-items: center;
      gap: var(--spacer-4);
      font-size: var(--body-sm-font-size);
      line-height: var(--body-sm-line-height);
      font-weight: var(--font-weight-medium);
      font-variant-numeric: tabular-nums;
    }
    .ds-statcard__delta.is-up { color: var(--status-success-default); }
    .ds-statcard__delta.is-down { color: var(--status-error-default); }
    .ds-statcard__delta .ds-statcard__caption {
      color: var(--text-tertiary);
      font-weight: var(--font-weight-default);
    }
    .ds-statcard__grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacer-16);
    }
    /* @component-css-end */
  </style>
</head>
<body>
  <div class="pv-header">
    <h1>Stat card</h1>
    <p>KPI 指标卡：大写小标签 + 等宽大数字 + 涨跌 delta。</p>
  </div>
  <div class="pv-section">
    <div class="pv-section__title">KPI grid</div>
    <div class="ds-statcard__grid">
      <div class="ds-statcard">
        <span class="ds-statcard__label">Monthly revenue</span>
        <span class="ds-statcard__value">$84,290</span>
        <span class="ds-statcard__delta is-up">
          <img src="../assets/icons/trending-up.svg" width="16" height="16" alt="trending-up" class="icon" />
          +12.4%
          <span class="ds-statcard__caption">vs last month</span>
        </span>
      </div>
      <div class="ds-statcard">
        <span class="ds-statcard__label">Active users</span>
        <span class="ds-statcard__value">28,412</span>
        <span class="ds-statcard__delta is-up">
          <img src="../assets/icons/arrow-up.svg" width="16" height="16" alt="arrow-up" class="icon" />
          +3.1%
          <span class="ds-statcard__caption">7-day</span>
        </span>
      </div>
      <div class="ds-statcard">
        <span class="ds-statcard__label">Churn rate</span>
        <span class="ds-statcard__value">2.7%</span>
        <span class="ds-statcard__delta is-down">
          <img src="../assets/icons/trending-down.svg" width="16" height="16" alt="trending-down" class="icon" />
          -0.4%
          <span class="ds-statcard__caption">vs last month</span>
        </span>
      </div>
      <div class="ds-statcard">
        <span class="ds-statcard__label">Avg. response time</span>
        <span class="ds-statcard__value">312ms</span>
        <span class="ds-statcard__delta is-down">
          <img src="../assets/icons/arrow-down.svg" width="16" height="16" alt="arrow-down" class="icon" />
          -18ms
          <span class="ds-statcard__caption">faster</span>
        </span>
      </div>
    </div>
  </div>
</body>
</html>
